<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#191919">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>The Art of Albert S. Leung</title>
<style>
@font-face { font-family:'Effra'; src:url('assets/fonts/Effra_Bold.ttf') format('truetype'); font-weight:700; }
@font-face { font-family:'Effra'; src:url('assets/fonts/Effra_Light.ttf') format('truetype'); font-weight:300; }

:root {
  --autumn: #E36519;
  --gold:   #C5A958;
  --char:   #191919;
  --cream:  #FAF6EE;
  --border: rgba(197,169,88,0.22);
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

html { height:100%; overscroll-behavior-y:contain; }

body {
  min-height:100dvh;
  background:var(--char);
  font-family:'Effra', Georgia, serif;
  color:var(--cream);
  -webkit-font-smoothing:antialiased;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}

/* Background canvas */
#bg-canvas {
  position:fixed; inset:0; width:100%; height:100%;
  z-index:0; opacity:0.13; pointer-events:none;
}

/* Page */
.page {
  position:relative; z-index:1;
  min-height:100dvh;
  display:flex; flex-direction:column; align-items:center;
  padding-bottom:52px;
}

/* Header */
.header {
  width:100%; padding:18px 20px 15px;
  display:flex; align-items:center; gap:12px;
  border-bottom:1px solid var(--border);
  background:rgba(20,18,16,0.82);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  position:sticky; top:0; z-index:20;
}
.header-seal {
  width:40px; height:40px; border:1.5px solid var(--gold); border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; color:var(--gold);
  letter-spacing:0.03em; text-transform:uppercase; flex-shrink:0;
  background:rgba(197,169,88,0.09);
}
.header-titles { flex:1; min-width:0; }
.header-sub {
  font-weight:300; font-size:9.5px; letter-spacing:0.2em;
  text-transform:uppercase; color:var(--gold); line-height:1; margin-bottom:3px;
}
.header-main {
  font-weight:700; font-size:15px; letter-spacing:0.03em;
  color:var(--cream); line-height:1.2;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}

/* Card */
.card {
  width:min(520px, 100%);
  margin:22px clamp(0px,3vw,16px) 0;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  border-radius:20px; overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,0.65);
  animation:rise 0.8s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes rise { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }

/* Media area */
.media-wrapper {
  position:relative; width:100%; aspect-ratio:4/3;
  background:#0d0d0c; overflow:hidden;
}
.media-wrapper img,
.media-wrapper video {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; display:none;
}
.media-wrapper.show-thumb img  { display:block; }
.media-wrapper.show-video video { display:block; }

/* Placeholder */
.media-placeholder {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px;
  background:linear-gradient(155deg, #1c1a17 0%, #0e0d0b 100%);
}
.placeholder-seal {
  width:76px; height:76px; border:1.5px solid rgba(197,169,88,0.28);
  border-radius:10px; display:flex; align-items:center; justify-content:center;
  font-size:19px; font-weight:700; color:rgba(197,169,88,0.32); letter-spacing:0.04em;
}
.placeholder-lbl {
  font-size:10px; font-weight:700; letter-spacing:0.2em;
  text-transform:uppercase; color:rgba(197,169,88,0.25);
}

/* Artwork label overlay */
.artwork-label {
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(transparent, rgba(14,12,10,0.94));
  padding:38px 18px 16px; pointer-events:none;
}
.artwork-title {
  font-weight:700; font-size:17px; letter-spacing:0.02em;
  color:#ffffff; line-height:1.2;
  text-shadow:0 1px 4px rgba(0,0,0,0.5);
}
.artwork-medium {
  font-weight:300; font-size:11.5px; color:var(--gold);
  letter-spacing:0.08em; margin-top:4px;
}

/* Buffering */
.buffering-bar {
  position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, transparent, var(--autumn), transparent);
  background-size:200% 100%; animation:shimmer 1.2s ease infinite;
  display:none; z-index:5;
}
.buffering-bar.active { display:block; }
@keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }

/* Error state */
.error-overlay {
  position:absolute; inset:0;
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:12px;
  background:rgba(14,12,10,0.92); padding:24px; text-align:center;
}
.error-overlay.show { display:flex; }
.error-icon { font-size:36px; }
.error-title { font-weight:700; font-size:15px; color:var(--cream); }
.error-desc { font-weight:300; font-size:13px; color:rgba(250,246,238,0.65); line-height:1.65; }

/* Progress / waveform */
.progress-area { padding:18px 18px 0; }
.waveform-container {
  width:100%; height:58px; position:relative;
  cursor:pointer; border-radius:4px; overflow:hidden;
  touch-action:none;
  /* Visible track behind bars */
  background:rgba(197,169,88,0.06);
  border-radius:6px;
}
#waveform-canvas { display:block; width:100%; height:100%; }

.progress-times {
  display:flex; justify-content:space-between; margin-top:8px;
  font-size:12px; font-weight:300;
  color:rgba(250,246,238,0.6); letter-spacing:0.06em;
}

/* Description */
.desc-block { padding:16px 18px 6px; }
.clip-context {
  font-weight:300; font-size:15px; line-height:1.75;
  color:rgba(250,246,238,0.88); letter-spacing:0.01em;
}

/* Controls */
.controls { padding:18px 18px 22px; display:flex; flex-direction:column; gap:16px; }

/* ── PULSING PLAY BUTTON — the signature design ── */
.play-btn-wrap {
  position:relative; width:80px; height:80px; flex-shrink:0;
}
/* Ring 1 — inner, stronger */
.pulse-ring-1 {
  position:absolute; inset:-8px; border-radius:50%;
  border:1.8px solid rgba(227,101,25,0.55);
  animation:pulse 2.4s cubic-bezier(0.4,0,0.6,1) infinite;
  pointer-events:none;
}
/* Ring 2 — outer, softer, delayed */
.pulse-ring-2 {
  position:absolute; inset:-18px; border-radius:50%;
  border:1.5px solid rgba(227,101,25,0.28);
  animation:pulse 2.4s cubic-bezier(0.4,0,0.6,1) infinite;
  animation-delay:0.85s;
  pointer-events:none;
}
@keyframes pulse {
  0%   { opacity:1; transform:scale(1); }
  65%  { opacity:0; transform:scale(1.55); }
  100% { opacity:0; transform:scale(1.55); }
}

/* The button itself */
.btn-play-main {
  position:absolute; inset:0;
  background:var(--autumn); border:none; border-radius:50%;
  color:#fff; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 6px 30px rgba(227,101,25,0.5);
  transition:background 0.2s, transform 0.15s, box-shadow 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.btn-play-main:hover  { background:#f0721f; box-shadow:0 8px 38px rgba(227,101,25,0.65); }
.btn-play-main:active { transform:scale(0.91); }
.btn-play-main svg { width:30px; height:30px; }
/* Nudge play icon slightly right (optical centering) */
.btn-play-main .icon-play { margin-left:4px; }

/* Loading ring inside play button */
.loading-ring {
  display:none; position:absolute; inset:0; margin:auto;
  width:36px; height:36px;
  border:3px solid rgba(255,255,255,0.18);
  border-top-color:#fff; border-radius:50%;
  animation:spin 0.8s linear infinite;
  pointer-events:none;
}
.btn-play-main.loading .loading-ring { display:block; }
.btn-play-main.loading .play-icon    { opacity:0; }
@keyframes spin { to{transform:rotate(360deg)} }

/* Controls row */
.controls-row {
  display:flex; align-items:center; justify-content:center;
  gap:10px;
}

/* Skip buttons */
.btn-skip {
  width:54px; height:54px; min-width:44px; min-height:44px;
  background:none; border:none; cursor:pointer;
  color:rgba(250,246,238,0.88);
  display:flex; align-items:center; justify-content:center;
  border-radius:50%;
  transition:background 0.2s, transform 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.btn-skip svg { width:27px; height:27px; }
.btn-skip:hover  { background:rgba(250,246,238,0.08); }
.btn-skip:active { transform:scale(0.9); }

/* Speed button */
.speed-btn {
  min-width:54px; height:36px;
  background:rgba(197,169,88,0.13);
  border:1px solid rgba(197,169,88,0.35);
  border-radius:20px; color:var(--gold);
  font-family:'Effra',sans-serif; font-weight:700;
  font-size:12px; letter-spacing:0.07em;
  padding:0 14px; cursor:pointer;
  transition:background 0.2s, transform 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.speed-btn:hover  { background:rgba(197,169,88,0.22); }
.speed-btn:active { transform:scale(0.92); }

/* Volume row */
.volume-row { display:flex; align-items:center; gap:10px; padding:0 2px; }
.vol-icon { color:rgba(250,246,238,0.55); flex-shrink:0; }
.vol-icon svg { width:18px; height:18px; display:block; }

input[type=range] {
  -webkit-appearance:none; appearance:none;
  flex:1; height:4px; border-radius:2px;
  background:rgba(250,246,238,0.22); outline:none; cursor:pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none;
  width:20px; height:20px; border-radius:50%;
  background:var(--gold); cursor:pointer;
  transition:transform 0.15s;
}
input[type=range]::-webkit-slider-thumb:hover { transform:scale(1.25); }
input[type=range]::-moz-range-thumb {
  width:20px; height:20px; border-radius:50%;
  background:var(--gold); border:none; cursor:pointer;
}
.vol-label {
  font-size:12px; font-weight:300;
  color:rgba(250,246,238,0.5);
  min-width:28px; text-align:right; letter-spacing:0.04em;
}

/* Action row */
.action-row {
  display:flex; align-items:center; justify-content:center;
  gap:4px; padding-top:6px;
  border-top:1px solid rgba(197,169,88,0.12);
}
.action-btn {
  background:none; border:none; cursor:pointer;
  color:rgba(250,246,238,0.6);
  display:flex; align-items:center; gap:6px;
  font-family:'Effra',sans-serif;
  font-size:11.5px; font-weight:300;
  letter-spacing:0.09em; text-transform:uppercase;
  padding:13px 12px; border-radius:24px;
  transition:background 0.2s, color 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.action-btn svg { width:16px; height:16px; flex-shrink:0; }
.action-btn:hover { background:rgba(250,246,238,0.08); color:var(--cream); }
.action-btn:active { transform:scale(0.94); }

/* Footer */
.footer { margin-top:28px; text-align:center; padding:0 20px; }
.footer-rule { width:40px; height:1px; background:rgba(197,169,88,0.32); margin:0 auto 12px; }
.footer-text {
  font-size:10.5px; font-weight:300;
  letter-spacing:0.14em; text-transform:uppercase;
  color:rgba(197,169,88,0.5); line-height:1.9;
}

/* Toast */
.toast {
  position:fixed;
  bottom:max(28px, calc(16px + env(safe-area-inset-bottom)));
  left:50%;
  transform:translateX(-50%) translateY(80px);
  background:#111; border:1px solid var(--gold);
  color:var(--cream); font-family:'Effra',sans-serif;
  font-size:13px; font-weight:300; letter-spacing:0.05em;
  padding:12px 22px; border-radius:40px;
  pointer-events:none;
  max-width:calc(100vw - 40px); text-align:center;
  transition:transform 0.35s cubic-bezier(0.22,1,0.36,1), opacity 0.35s;
  opacity:0; z-index:999;
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

/* Responsive */
@media(max-width:374px) {
  .artwork-title { font-size:15px; }
  .play-btn-wrap { width:70px; height:70px; }
  .action-btn { font-size:10px; padding:11px 8px; }
}
@media(min-width:600px) {
  .card { margin-top:30px; }
  .header { padding:22px 32px 18px; }
  .header-main { font-size:17px; }
  .controls { padding:20px 24px 24px; }
  .progress-area { padding:22px 24px 0; }
  .desc-block { padding:18px 24px 8px; }
  .artwork-title { font-size:18px; }
}
@media(max-height:500px) and (orientation:landscape) {
  .media-wrapper { aspect-ratio:16/7; }
  .page { padding-bottom:20px; }
  .card { margin-top:10px; }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="page">

  <header class="header">
    <div class="header-seal">ASL</div>
    <div class="header-titles">
      <div class="header-sub">The Art of</div>
      <div class="header-main">Albert S. Leung</div>
    </div>
  </header>

  <div class="card">

    <div class="media-wrapper" id="mediaWrapper">
      <div class="buffering-bar" id="bufferingBar"></div>

      <div class="media-placeholder" id="mediaPlaceholder">
        <div class="placeholder-seal">ASL</div>
        <div class="placeholder-lbl">Albert S. Leung</div>
      </div>

      <img id="artworkThumb" src="" alt="Artwork">
      <video id="videoEl" playsinline preload="metadata"></video>

      <div class="error-overlay" id="errorOverlay">
        <div class="error-icon">⚠️</div>
        <div class="error-title">Clip not found</div>
        <div class="error-desc" id="errorDesc">This clip hasn't been added to the player yet.</div>
      </div>

      <div class="artwork-label">
        <div class="artwork-title" id="artworkTitle"></div>
        <div class="artwork-medium" id="artworkMedium"></div>
      </div>
    </div>

    <audio id="audioEl" preload="auto"></audio>

    <div class="progress-area">
      <div class="waveform-container" id="waveformContainer" role="slider" aria-label="Playback position">
        <canvas id="waveform-canvas"></canvas>
      </div>
      <div class="progress-times">
        <span id="timeElapsed">0:00</span>
        <span id="timeDuration">—</span>
      </div>
    </div>

    <div class="desc-block">
      <p class="clip-context" id="clipContext"></p>
    </div>

    <div class="controls">

      <div class="controls-row">
        <!-- Rewind 15s -->
        <button class="btn-skip" id="btnRewind" aria-label="Back 15 seconds">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
            <text x="8.2" y="15.5" font-size="5" fill="currentColor" stroke="none" font-family="sans-serif" font-weight="bold">15</text>
          </svg>
        </button>

        <!-- Pulsing play button -->
        <div class="play-btn-wrap">
          <div class="pulse-ring-1"></div>
          <div class="pulse-ring-2"></div>
          <button class="btn-play-main" id="btnPlay" aria-label="Play">
            <div class="loading-ring"></div>
            <span class="play-icon">
              <svg id="iconPlay"  viewBox="0 0 24 24" fill="currentColor" class="icon-play"><polygon points="5,3 19,12 5,21"/></svg>
              <svg id="iconPause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
            </span>
          </button>
        </div>

        <!-- Forward 15s -->
        <button class="btn-skip" id="btnForward" aria-label="Forward 15 seconds">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-.49-4.5"/>
            <text x="8.2" y="15.5" font-size="5" fill="currentColor" stroke="none" font-family="sans-serif" font-weight="bold">15</text>
          </svg>
        </button>

        <button class="speed-btn" id="speedBtn">1×</button>
      </div>

      <!-- Volume -->
      <div class="volume-row">
        <span class="vol-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
        </span>
        <input type="range" id="volumeSlider" min="0" max="100" value="90" aria-label="Volume">
        <span class="vol-label" id="volumeLabel">90</span>
      </div>

      <!-- Action row -->
      <div class="action-row">
        <button class="action-btn" id="btnRestart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>
          </svg>
          Restart
        </button>
        <button class="action-btn" id="btnShare">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
          Share
        </button>
        <button class="action-btn" id="btnDownload">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7,10 12,15 17,10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Save
        </button>
      </div>

    </div>
  </div>

  <footer class="footer">
    <div class="footer-rule"></div>
    <div class="footer-text">The Art of Albert S. Leung<br>A Living Legacy</div>
  </footer>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  CLIPS REGISTRY
//  Add clips using the admin wizard — paste generated code
//  below the marker line.
//  Player URL format:  player.html?clip=CLIP-ID
// ═══════════════════════════════════════════════════════════
const CLIPS = {
  "intro": {
    title:   "Welcome — Albert's Story",
    medium:  "Albert S. Leung, recorded 2025",
    context: "In his own words, Albert S. Leung reflects on a lifetime of watching, learning, and painting the natural world around him.",
    type:    "audio",
    src:     "",
    thumb:   "",
  },
  "great-blue-heron": {
    title:   "Great Blue Heron",
    medium:  "Acrylic on canvas — Albert S. Leung in conversation",
    context: "Albert S. Leung describes the patient hours spent watching herons along the shoreline — their stillness, their focus — and how that shaped his approach to painting.",
    type:    "audio",
    src:     "",
    thumb:   "",
  },
  "monarch": {
    title:   "Monarch on Sunflower",
    medium:  "Watercolour on paper — Albert S. Leung in conversation",
    context: "A monarch butterfly poised on milkweed. Albert S. Leung speaks about migration, transformation, and what the monarch has meant to him across a lifetime of watching the natural world.",
    type:    "audio",
    src:     "",
    thumb:   "",
  },
  // ── ADD NEW CLIPS BELOW THIS LINE ──
    "still-life-ii": {
    title:   "Still Life II",
    medium:  "Oil on canvas",
    context: "Albert describes the process of painting this beautiful still life, which is a rare oil on canvas work on which he spent almost as much time shining a gleam on the kettle as he did on the composition itself.",
    type:    "audio",
    src:     "https://client-hosting.github.io/albert-s-leung/clips/still-life-ii.mp3",
    thumb:   "https://client-hosting.github.io/albert-s-leung/images/still-life-ii.jpg",
  },
};

// ═══════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════
const params = new URLSearchParams(location.search);
const clipId = params.get('clip') || 'intro';
const clip   = CLIPS[clipId];

const isVideo = clip && clip.type === 'video';
const audioEl = document.getElementById('audioEl');
const videoEl = document.getElementById('videoEl');
const mediaEl = isVideo ? videoEl : audioEl;

// ── Populate UI ──────────────────────────────────────────
if (!clip) {
  // Clip ID not found in registry
  document.getElementById('artworkTitle').textContent = 'Clip not found';
  document.getElementById('artworkMedium').textContent = '';
  document.getElementById('clipContext').textContent = '';
  document.getElementById('errorOverlay').classList.add('show');
  document.getElementById('errorDesc').textContent =
    `The clip "${clipId}" hasn't been added to the player yet. Please check the admin wizard.`;
  document.getElementById('mediaPlaceholder').style.display = 'none';
} else if (!clip.src) {
  // Clip exists in registry but has no media URL yet
  document.getElementById('artworkTitle').textContent  = clip.title  || '';
  document.getElementById('artworkMedium').textContent = clip.medium || '';
  document.getElementById('clipContext').textContent   = clip.context || '';
  document.getElementById('errorOverlay').classList.add('show');
  document.getElementById('errorDesc').textContent =
    `"${clip.title}" hasn't been linked to an audio file yet. Add the media URL in the admin wizard.`;
  document.getElementById('mediaPlaceholder').style.display = 'none';
  if (clip.thumb) {
    const img = document.getElementById('artworkThumb');
    img.src = clip.thumb;
    document.getElementById('mediaWrapper').classList.add('show-thumb');
    document.getElementById('mediaPlaceholder').style.display = 'none';
  }
} else {
  // All good — set up player
  document.getElementById('artworkTitle').textContent  = clip.title  || 'Albert S. Leung';
  document.getElementById('artworkMedium').textContent = clip.medium || '';
  document.getElementById('clipContext').innerHTML     = clip.context || '';

  mediaEl.src = clip.src;
  mediaEl.preload = 'auto';

  if (isVideo) {
    document.getElementById('mediaWrapper').classList.add('show-video');
    document.getElementById('mediaPlaceholder').style.display = 'none';
  } else if (clip.thumb) {
    const img = document.getElementById('artworkThumb');
    img.src = clip.thumb;
    document.getElementById('mediaWrapper').classList.add('show-thumb');
    document.getElementById('mediaPlaceholder').style.display = 'none';
  }
}

document.title = clip
  ? `${clip.title} — Albert S. Leung`
  : 'The Art of Albert S. Leung';

// ═══════════════════════════════════════════════════════════
//  BACKGROUND LEAVES
// ═══════════════════════════════════════════════════════════
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, leaves;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    leaves = Array.from({length:16}, () => ({
      x: Math.random()*W, y: Math.random()*H,
      r: 12 + Math.random()*50,
      hue: Math.random()<0.6 ? '#E36519' : '#C5A958',
      a: 0.04 + Math.random()*0.09,
      vx: (Math.random()-0.5)*0.09,
      vy: 0.03 + Math.random()*0.065,
      rot: Math.random()*Math.PI*2,
      vrot: (Math.random()-0.5)*0.004,
    }));
  }

  function drawLeaf(x,y,r,rot,col,a) {
    ctx.save(); ctx.globalAlpha=a;
    ctx.translate(x,y); ctx.rotate(rot);
    ctx.beginPath();
    ctx.moveTo(0,-r);
    ctx.bezierCurveTo(r*.6,-r*.5, r*.7,r*.4, 0,r);
    ctx.bezierCurveTo(-r*.7,r*.4, -r*.6,-r*.5, 0,-r);
    ctx.fillStyle=col; ctx.fill(); ctx.restore();
  }

  function frame() {
    ctx.clearRect(0,0,W,H);
    for (const l of leaves) {
      drawLeaf(l.x,l.y,l.r,l.rot,l.hue,l.a);
      l.x+=l.vx; l.y+=l.vy; l.rot+=l.vrot;
      if (l.y-l.r > H) { l.y=-l.r; l.x=Math.random()*W; }
    }
    requestAnimationFrame(frame);
  }

  resize();
  window.addEventListener('resize', () => { resize(); if(window._waveResize) _waveResize(); });
  frame();
})();

// ═══════════════════════════════════════════════════════════
//  WAVEFORM
// ═══════════════════════════════════════════════════════════
(function () {
  const canvas    = document.getElementById('waveform-canvas');
  const ctx       = canvas.getContext('2d');
  const container = document.getElementById('waveformContainer');
  let bars=[], progress=0;

  function initBars(n) {
    bars = Array.from({length:n}, ()=>0.12+Math.random()*0.88);
  }

  function draw() {
    const W=container.clientWidth, H=container.clientHeight;
    ctx.clearRect(0,0,W,H);
    if (!bars.length) return;
    const barW=W/bars.length, gap=barW*0.38;
    for (let i=0; i<bars.length; i++) {
      const bx=i*barW+gap/2, bw=Math.max(barW-gap,1);
      const bh=bars[i]*(H*0.86), by=(H-bh)/2;
      const done=i/bars.length<progress;
      ctx.fillStyle = done ? '#E36519' : 'rgba(197,169,88,0.3)';
      const r=Math.min(bw/2,3);
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(bx,by,bw,bh,r);
      else ctx.rect(bx,by,bw,bh);
      ctx.fill();
    }
  }

  function resize() {
    const dpr=window.devicePixelRatio||1;
    canvas.width=container.clientWidth*dpr;
    canvas.height=container.clientHeight*dpr;
    canvas.style.width=container.clientWidth+'px';
    canvas.style.height=container.clientHeight+'px';
    ctx.scale(dpr,dpr);
    initBars(Math.max(50,Math.floor(container.clientWidth/3.5)));
    draw();
  }

  window._waveSetProgress = p => { progress=Math.max(0,Math.min(1,p)); draw(); };
  window._waveResize = resize;
  resize();

  // Seek by touch or mouse
  let seeking=false;
  function seek(e) {
    e.preventDefault();
    const rect=container.getBoundingClientRect();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const ratio=Math.max(0,Math.min(1,(clientX-rect.left)/rect.width));
    if (mediaEl && mediaEl.duration && isFinite(mediaEl.duration)) {
      mediaEl.currentTime=ratio*mediaEl.duration;
      _waveSetProgress(ratio);
    }
  }
  container.addEventListener('pointerdown', e=>{ seeking=true; seek(e); });
  container.addEventListener('pointermove', e=>{ if(seeking) seek(e); });
  container.addEventListener('pointerup',   ()=>{ seeking=false; });
  container.addEventListener('pointercancel',()=>{ seeking=false; });
})();

// ═══════════════════════════════════════════════════════════
//  PLAYBACK
// ═══════════════════════════════════════════════════════════
const btnPlayEl  = document.getElementById('btnPlay');
const iconPlay   = document.getElementById('iconPlay');
const iconPause  = document.getElementById('iconPause');
const btnRewind  = document.getElementById('btnRewind');
const btnForward = document.getElementById('btnForward');
const btnRestart = document.getElementById('btnRestart');
const speedBtn   = document.getElementById('speedBtn');
const volSlider  = document.getElementById('volumeSlider');
const volLabel   = document.getElementById('volumeLabel');
const elapsed    = document.getElementById('timeElapsed');
const durEl      = document.getElementById('timeDuration');
const buffBar    = document.getElementById('bufferingBar');

const speeds=[1,1.25,1.5,0.75];
let speedIdx=0;

function fmt(s) {
  s=Math.floor(s||0);
  const m=Math.floor(s/60);
  return `${m}:${String(s%60).padStart(2,'0')}`;
}

function syncPlay(playing) {
  iconPlay.style.display  = playing?'none':'block';
  iconPause.style.display = playing?'block':'none';
  btnPlayEl.setAttribute('aria-label', playing?'Pause':'Play');
}

if (mediaEl && clip && clip.src) {
  mediaEl.addEventListener('loadedmetadata', ()=>{ durEl.textContent=fmt(mediaEl.duration); });
  mediaEl.addEventListener('timeupdate', ()=>{
    elapsed.textContent=fmt(mediaEl.currentTime);
    if(mediaEl.duration) _waveSetProgress(mediaEl.currentTime/mediaEl.duration);
  });
  mediaEl.addEventListener('play',    ()=>{ syncPlay(true);  buffBar.classList.remove('active'); });
  mediaEl.addEventListener('pause',   ()=>  syncPlay(false));
  mediaEl.addEventListener('ended',   ()=>{ syncPlay(false); _waveSetProgress(0); elapsed.textContent='0:00'; });
  mediaEl.addEventListener('waiting', ()=>  buffBar.classList.add('active'));
  mediaEl.addEventListener('playing', ()=>  buffBar.classList.remove('active'));
  mediaEl.addEventListener('error',   ()=>{
    document.getElementById('errorOverlay').classList.add('show');
    document.getElementById('errorDesc').textContent='Could not load the audio file. Please check the media URL in the admin wizard.';
    buffBar.classList.remove('active');
  });
  mediaEl.addEventListener('stalled', ()=>  buffBar.classList.add('active'));
  mediaEl.addEventListener('canplay', ()=>  buffBar.classList.remove('active'));
}

btnPlayEl.addEventListener('click', ()=>{
  if (!clip || !clip.src) return;
  if (mediaEl.paused) {
    mediaEl.play().catch(()=>showToast('Tap play again to start'));
  } else {
    mediaEl.pause();
  }
});

btnRewind.addEventListener('click',  ()=>{ if(mediaEl) mediaEl.currentTime=Math.max(0,mediaEl.currentTime-15); });
btnForward.addEventListener('click', ()=>{ if(mediaEl) mediaEl.currentTime=Math.min(mediaEl.duration||0,mediaEl.currentTime+15); });
btnRestart.addEventListener('click', ()=>{ if(mediaEl){ mediaEl.currentTime=0; mediaEl.play().catch(()=>{}); } });

speedBtn.addEventListener('click', ()=>{
  speedIdx=(speedIdx+1)%speeds.length;
  if(mediaEl) mediaEl.playbackRate=speeds[speedIdx];
  speedBtn.textContent=speeds[speedIdx]+'×';
});

volSlider.addEventListener('input', ()=>{
  if(mediaEl) mediaEl.volume=volSlider.value/100;
  volLabel.textContent=volSlider.value;
});
if (mediaEl) mediaEl.volume=volSlider.value/100;

// Share
document.getElementById('btnShare').addEventListener('click', async ()=>{
  const data={
    title:`The Art of Albert S. Leung — ${clip?clip.title:''}`,
    text: clip&&clip.context ? clip.context.replace(/<[^>]*>/g,'') : '',
    url:  location.href,
  };
  if (navigator.share) {
    try { await navigator.share(data); } catch(e) {}
  } else {
    try { await navigator.clipboard.writeText(location.href); showToast('Link copied to clipboard'); }
    catch(e) { showToast('Copy this URL: '+location.href); }
  }
});

// Download
document.getElementById('btnDownload').addEventListener('click', ()=>{
  if (!clip||!clip.src) { showToast('No media file linked yet.'); return; }
  const a=document.createElement('a');
  a.href=clip.src;
  a.download=(clip.title?clip.title.toLowerCase().replace(/\s+/g,'-'):'albert-s-leung')+(isVideo?'.mp4':'.mp3');
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
});

// Toast
function showToast(msg,dur=3200) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),dur);
}

// Keyboard
document.addEventListener('keydown', e=>{
  if (e.target.tagName==='INPUT') return;
  if (e.code==='Space')      { e.preventDefault(); btnPlayEl.click(); }
  if (e.code==='ArrowLeft')  btnRewind.click();
  if (e.code==='ArrowRight') btnForward.click();
});
</script>
</body>
